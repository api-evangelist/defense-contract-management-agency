description: >-
  The Defense Contract Management Agency (DCMA) is the Department of Defense
  component that works directly with defense suppliers to help ensure that DoD,
  federal, and allied government supplies and services are delivered on time,
  at projected cost, and meet performance requirements. DCMA performs contract
  administration, quality assurance, and earned value management oversight,
  but does not currently expose a public developer API.
